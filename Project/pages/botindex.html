<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Chatbot</title>
  <link rel="stylesheet" href="../css/botstyle.css">
</head>
<body>
  <div class="container">
    <header>
  
      <h1>Hospital AI Chatbot</h1>
    </header>

    <!-- Patient Form -->
    <section id="patient-form">
      <h2>Enter Patient Details</h2>
      <form id="detailsForm">
        <input type="text" name="name" placeholder="Name" required>
        <input type="number" name="age" placeholder="Age" required>
        <input type="text" name="gender" placeholder="Gender" required>
        <input type="text" name="symptoms" placeholder="Main Symptoms" required>
        <button type="submit">Start Chat</button>
      </form>
    </section>

    <!-- Chat Window -->
    <section id="chat-section" class="hidden">
      <div id="chat-window"></div>
      <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message... eg. symptoms, pain, fever  ">
        <button id="sendBtn">Send</button>
      </div>
      <button id="clearChat">Clear Chat</button>
      <button id="toggleMode">Toggle Dark/Light</button>
    </section>
  </div>

  <script src="../js/botscript.js"></script>
</body>
</html>
